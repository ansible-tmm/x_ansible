---
# Copy this file to vars/credentials.yml and encrypt it with Ansible Vault:
#
#   cp vars/credentials_example.yml vars/credentials.yml
#   # Edit vars/credentials.yml with your real values
#   ansible-vault encrypt vars/credentials.yml
#
# Then uncomment the vars_files line in post_to_x.yml.
#
# To run with vault:
#   ansible-playbook post_to_x.yml -e 'post_text=hello' --ask-vault-pass
# Or:
#   ansible-playbook post_to_x.yml -e 'post_text=hello' --vault-password-file ~/.vault_pass

vault_x_api_key: "REPLACE_WITH_YOUR_API_KEY"
vault_x_api_secret: "REPLACE_WITH_YOUR_API_SECRET"
vault_x_access_token: "REPLACE_WITH_YOUR_ACCESS_TOKEN"
vault_x_access_token_secret: "REPLACE_WITH_YOUR_ACCESS_TOKEN_SECRET"
